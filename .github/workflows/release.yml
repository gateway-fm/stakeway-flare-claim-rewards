name: Release

on:
  push:
    tags:
      - 'v*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Get tag name
        id: tag_name
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build for Linux amd64
        run: |
          GOOS=linux GOARCH=amd64 go build -o rewardmanager-linux-amd64 ./cmd/rewardmanager
        env:
          CGO_ENABLED: 0

      - name: Build for macOS arm64
        run: |
          GOOS=darwin GOARCH=arm64 go build -o rewardmanager-darwin-arm64 ./cmd/rewardmanager
        env:
          CGO_ENABLED: 0

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            rewardmanager-linux-amd64
            rewardmanager-darwin-arm64
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
