name: Release

on:
  push:
    tags:
      - 'v*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.25'

      - name: Get tag name
        id: tag_name
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build for Linux amd64
        run: |
          GOOS=linux GOARCH=amd64 go build -o rewardmanager-linux-amd64 ./cmd/rewardmanager
        env:
          CGO_ENABLED: 0

      - name: Build for macOS arm64
        run: |
          GOOS=darwin GOARCH=arm64 go build -o rewardmanager-darwin-arm64 ./cmd/rewardmanager
        env:
          CGO_ENABLED: 0

      - name: Create Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v0.1.15
        with:
          files: |
            rewardmanager-linux-amd64
            rewardmanager-darwin-arm64
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
